<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto Preview - De Verfwacht</title>
<style>
  body { font-family: sans-serif; background: #0b162a; color: #e2e2e2; margin: 0; padding: 20px; }
  h1 { text-align: center; margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card { background: #1a1c1c; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
  .card img { width: 100%; height: 220px; object-fit: cover; display: block; }
  .card .info { padding: 10px; font-size: 14px; display: flex; justify-content: space-between; }
  .card .num { color: #efbf69; font-weight: bold; }
</style>
</head>
<body>
<h1>Foto Preview - 76 Afbeeldingen</h1>
<div class="grid" id="grid"></div>
<script>
const files = [];
for (let i = 14; i <= 90; i++) {
  const n = i.toString().padStart(2, '0');
  files.push(`IMG-20260520-WA00${n}.jpg`);
}
const grid = document.getElementById('grid');
files.forEach((f, idx) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<img src="../uitzoeken/verfeacht/${f}" loading="lazy" alt="${f}"><div class="info"><span class="num">#${idx+1}</span><span>${f}</span></div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
